<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>熟語マスター Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090f;
  --card: #0e1420;
  --border: #1c2a40;
  --accent: #4f8ef7;
  --gold: #f0b429;
  --red: #ef4444;
  --green: #22c55e;
  --text: #e8edf5;
  --muted: #4a5568;
  --dim: #8899aa;
  --lv1: #64748b;
  --lv2: #8b5cf6;
  --lv3: #3b82f6;
  --lv4: #f59e0b;
  --lv5: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  user-select: none;
  overflow: auto;
}

/* ═══ HEADER ═══ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.logo { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); }
.nav-btn {
  border: 1px solid var(--border); background: var(--card); color: var(--dim);
  border-radius: 8px; cursor: pointer; padding: 6px 12px; font-size: 13px;
  font-family: inherit; transition: all .15s;
}
.nav-btn:hover { color: var(--text); }

/* ═══ PAGES ═══ */
.page { display: none; padding: 20px; max-width: 640px; margin: 0 auto; width: 100%; }
.page.active { display: block; }

/* ═══ HOME ═══ */
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
}
.stat-title { font-size: 14px; color: var(--muted); margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
.stat-big { font-size: 48px; font-weight: 700; font-family: 'Playfair Display', serif; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-item { text-align: center; padding: 16px; background: #0a0d15; border-radius: 12px; }
.stat-num { font-size: 32px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

.unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.unit-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 14px; cursor: pointer;
  transition: all .15s; position: relative;
}
.unit-card:hover { border-color: var(--dim); transform: translateY(-2px); }
.unit-num { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.unit-prog { font-size: 20px; font-weight: 700; color: var(--accent); }
.unit-bar { height: 4px; background: var(--border); border-radius: 99px; margin-top: 8px; overflow: hidden; }
.unit-fill { height: 100%; background: linear-gradient(90deg, var(--lv3), var(--lv5)); transition: width .4s; }

.special-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.special-btn {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 20px 16px; cursor: pointer;
  transition: all .15s; text-align: center;
}
.special-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
.special-icon { font-size: 32px; margin-bottom: 8px; }
.special-name { font-size: 14px; font-weight: 700; }

/* ═══ STUDY ═══ */
#study-page { padding: 0; max-width: none; }
#study-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.mode-toggle {
  display: flex;
  background: #111827;
  border-radius: 99px;
  padding: 3px;
  gap: 2px;
}
.mode-btn {
  border: none; cursor: pointer; border-radius: 99px;
  padding: 6px 14px; font-size: 13px; font-family: inherit;
  font-weight: 700; transition: all .2s; color: var(--muted); background: none;
}
.mode-btn.active { background: var(--accent); color: #fff; }

#study-progress { font-size: 13px; color: var(--dim); }
#pbar-wrap { height: 3px; background: var(--border); }
#pbar { height: 100%; background: var(--accent); transition: width .4s ease; }

#study-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  position: relative;
  min-height: 60vh;
}
#study-main.clickable { cursor: pointer; }

#study-card {
  width: 100%;
  max-width: 480px;
  min-height: 280px;
  border-radius: 24px;
  border: 1.5px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 28px;
  gap: 16px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  transition: border-color .3s;
}
#study-card.flipped {
  border-color: #2a3f6a;
  background: linear-gradient(145deg, #0e1420, #0a1628);
}

#card-phase { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
#card-phrase {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 32px;
  line-height: 1.3;
  text-align: center;
  color: var(--text);
  min-height: 44px;
}
#card-phrase.small { font-size: 20px; color: var(--dim); }
#card-meaning {
  font-size: 26px;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  line-height: 1.4;
  display: none;
}
#card-example {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  width: 100%;
}
#card-example-en {
  font-size: 13px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.6;
  margin-bottom: 6px;
}
#card-example-ja {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.ex-speak-btn {
  border: 1px solid var(--border); background: var(--card); color: var(--dim);
  border-radius: 99px; cursor: pointer; padding: 5px 12px; font-size: 12px;
  font-family: inherit; margin-top: 8px; transition: all .15s;
}
.ex-speak-btn:hover { border-color: var(--accent); color: var(--accent); }

#level-buttons {
  display: none;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.lv-btn {
  border: 1.5px solid var(--border); background: var(--card);
  border-radius: 8px; cursor: pointer; padding: 8px 12px;
  font-size: 12px; font-family: inherit; transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.lv-btn:hover { transform: translateY(-2px); }
.lv-btn.lv1 { border-color: var(--lv1); color: var(--lv1); }
.lv-btn.lv2 { border-color: var(--lv2); color: var(--lv2); }
.lv-btn.lv3 { border-color: var(--lv3); color: var(--lv3); }
.lv-btn.lv4 { border-color: var(--lv4); color: var(--lv4); }
.lv-btn.lv5 { border-color: var(--lv5); color: var(--lv5); }
.lv-btn.active { background: currentColor; color: #fff !important; }
.lv-icon { font-size: 16px; }
.lv-name { font-size: 10px; }

#start-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.85);
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#start-overlay.show { display: flex; }
.start-btn {
  background: var(--accent); border: none; color: #fff;
  border-radius: 99px; cursor: pointer; padding: 16px 48px;
  font-size: 18px; font-family: inherit; font-weight: 700;
  transition: all .15s;
}
.start-btn:hover { transform: scale(1.05); }

#pause-overlay {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  pointer-events: none;
  color: #ffffff55;
}
#pause-overlay.show { display: flex; }

#study-controls {
  padding: 16px 20px 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  max-width: 520px;
  width: 100%;
  margin: 0 auto;
}
.ctrl-btn {
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  border-radius: 99px;
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  padding: 12px 22px;
  transition: all .15s;
}
.ctrl-btn:active { transform: scale(.95); }
#ctrl-play {
  flex: 1;
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-size: 18px;
  padding: 14px;
}

#speed-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 20px 12px;
}
.speed-btn {
  border: 1px solid var(--border); background: none; color: var(--dim);
  border-radius: 6px; cursor: pointer; padding: 4px 10px; font-size: 12px;
  font-family: inherit; transition: all .15s;
}
.speed-btn.on { border-color: var(--accent); color: var(--accent); }
#speed-label { font-size: 12px; color: var(--muted); }

#audio-indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  opacity: 0;
  transition: opacity .2s;
  margin-right: 8px;
}
#audio-indicator.on { opacity: 1; }

/* ═══ QUIZ ═══ */
.quiz-question {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 24px; margin-bottom: 20px;
  text-align: center;
}
.quiz-phrase {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 16px;
}
.quiz-prompt { font-size: 14px; color: var(--muted); }

.quiz-options { display: flex; flex-direction: column; gap: 12px; }
.quiz-opt {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 16px 20px; cursor: pointer;
  transition: all .15s; text-align: left; font-size: 15px;
}
.quiz-opt:hover { border-color: var(--dim); }
.quiz-opt.correct { border-color: var(--green); background: #22c55e22; }
.quiz-opt.wrong { border-color: var(--red); background: #ef444422; }
.quiz-opt.disabled { cursor: default; opacity: .7; }

.quiz-result {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px; margin-top: 20px;
  text-align: center; display: none;
}
.quiz-result.show { display: block; }
.result-icon { font-size: 48px; margin-bottom: 12px; }
.result-text { font-size: 16px; margin-bottom: 16px; }

/* ═══ STATS ═══ */
.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
}
.chart-title { font-size: 14px; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
.level-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.level-bar-label { width: 80px; font-size: 13px; display: flex; align-items: center; gap: 4px; }
.level-bar-fill {
  flex: 1;
  height: 24px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
}
.level-bar-inner {
  height: 100%;
  border-radius: 99px;
  transition: width .5s ease;
}
.level-bar-count {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}

.btn-primary {
  background: var(--accent); border: none; color: #fff;
  border-radius: 99px; cursor: pointer; padding: 12px 24px;
  font-size: 15px; font-family: inherit; font-weight: 700;
  transition: all .15s; display: block; width: 100%;
}
.btn-primary:hover { transform: translateY(-2px); }

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeUp .25s ease; }
</style>
</head>
<body>

<header>
  <div class="logo">📚 熟語マスター Pro</div>
  <button class="nav-btn" id="nav-btn" onclick="navBack()">← ホーム</button>
</header>

<!-- ════════════ HOME ════════════ -->
<div class="page active" id="page-home">
  <div class="stat-card">
    <div class="stat-title">総合進捗</div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px">
      <div class="stat-big" id="home-master-pct">0%</div>
      <div style="font-size:14px;color:var(--muted)" id="home-master-count">0 / 380</div>
    </div>
    <div class="stat-grid">
      <div class="stat-item">
        <div class="stat-num" style="color:var(--green)" id="home-streak">0</div>
        <div class="stat-lbl">🔥 連続日数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" style="color:var(--accent)" id="home-time">0</div>
        <div class="stat-lbl">⏱️ 今日の学習（分）</div>
      </div>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-title">ユニット選択</div>
    <div class="unit-grid" id="unit-grid"></div>
  </div>

  <div class="stat-card">
    <div class="stat-title">特別モード</div>
    <div class="special-grid">
      <div class="special-btn" onclick="startSpecial('weak')">
        <div class="special-icon">🎯</div>
        <div class="special-name">弱点集中</div>
      </div>
      <div class="special-btn" onclick="startSpecial('daily')">
        <div class="special-icon">☀️</div>
        <div class="special-name">今日の20語</div>
      </div>
      <div class="special-btn" onclick="startSpecial('quiz')">
        <div class="special-icon">❓</div>
        <div class="special-name">クイズ</div>
      </div>
      <div class="special-btn" onclick="showPage('stats')">
        <div class="special-icon">📊</div>
        <div class="special-name">統計</div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════ STUDY ════════════ -->
<div class="page" id="page-study">
  <div id="study-topbar">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-auto" onclick="setMode('auto')">自動</button>
      <button class="mode-btn" id="btn-manual" onclick="setMode('manual')">手動</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="audio-indicator"></div>
      <span id="study-progress">1 / 19</span>
    </div>
  </div>
  <div id="pbar-wrap"><div id="pbar" style="width:0%"></div></div>

  <div id="study-main">
    <div id="study-card">
      <div id="card-phase">PHRASAL VERB</div>
      <div id="card-phrase">—</div>
      <div id="card-meaning">—</div>
      <div id="card-example">
        <div id="card-example-en"></div>
        <div id="card-example-ja"></div>
        <button class="ex-speak-btn" onclick="speakExample()">📖 例文を読む</button>
      </div>
      <div id="level-buttons">
        <button class="lv-btn lv1" onclick="setLevel(1)"><span class="lv-icon">🌱</span><span class="lv-name">はじめまして</span></button>
        <button class="lv-btn lv2" onclick="setLevel(2)"><span class="lv-icon">🌿</span><span class="lv-name">なんとなく</span></button>
        <button class="lv-btn lv3" onclick="setLevel(3)"><span class="lv-icon">🌳</span><span class="lv-name">だいたいOK</span></button>
        <button class="lv-btn lv4" onclick="setLevel(4)"><span class="lv-icon">⭐</span><span class="lv-name">自信あり</span></button>
        <button class="lv-btn lv5" onclick="setLevel(5)"><span class="lv-icon">🏆</span><span class="lv-name">マスター</span></button>
      </div>
    </div>
    <div id="tap-hint" style="margin-top:12px;font-size:12px;color:var(--muted)">タップで一時停止</div>
    <div id="start-overlay">
      <button class="start-btn" onclick="startAuto()">▶ スタート</button>
    </div>
    <div id="pause-overlay">⏸</div>
  </div>

  <div id="speed-row">
    <span id="speed-label">速度：</span>
    <button class="speed-btn" onclick="setSpeed(0)">遅め</button>
    <button class="speed-btn on" onclick="setSpeed(1)">普通</button>
    <button class="speed-btn" onclick="setSpeed(2)">速め</button>
  </div>

  <div id="study-controls">
    <button class="ctrl-btn" onclick="goPrev()">◀</button>
    <button class="ctrl-btn" id="ctrl-play" onclick="togglePlay()">⏸</button>
    <button class="ctrl-btn" onclick="goNext()">▶</button>
  </div>
</div>

<!-- ════════════ QUIZ ════════════ -->
<div class="page" id="page-quiz">
  <div class="quiz-question">
    <div class="quiz-phrase" id="quiz-phrase">—</div>
    <div class="quiz-prompt">この意味は？</div>
  </div>
  <div class="quiz-options" id="quiz-options"></div>
  <div class="quiz-result" id="quiz-result">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-text" id="result-text"></div>
    <button class="btn-primary" onclick="nextQuiz()">次へ</button>
  </div>
</div>

<!-- ════════════ STATS ════════════ -->
<div class="page" id="page-stats">
  <div class="chart-card">
    <div class="chart-title">レベル別分布</div>
    <div id="level-chart"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">学習記録</div>
    <div style="display:flex;gap:20px;justify-content:space-around">
      <div style="text-align:center">
        <div style="font-size:36px;font-weight:700;color:var(--green)" id="stats-streak">0</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">🔥 連続日数</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:36px;font-weight:700;color:var(--accent)" id="stats-time">0</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">⏱️ 今日の学習（分）</div>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// DATA — 380 words split into 20 units
// ════════════════════════════════════════
const ALL_WORDS = [
  ["abide by ~","〜に従う、〜を守る","You must abide by the rules of the competition.","大会のルールに従わなければなりません。"],
  ["act up","不調になる、わがままを言う","My car has been acting up again — it won't start in the morning.","また車の調子が悪い。朝エンジンがかからない。"],
  ["atone for ~","〜を償う","He volunteered at the shelter to atone for his past mistakes.","彼は過去の過ちを償うために施設でボランティアをした。"],
  ["back down","折れる、引き下がる","Despite the pressure, she refused to back down from her opinion.","プレッシャーにもかかわらず、彼女は自分の意見を引っ込めることを拒んだ。"],
  ["back out","手を引く、撤退する","He backed out of the deal at the last minute, leaving everyone frustrated.","彼は土壇場で取引から手を引き、全員を困惑させた。"],
  ["bail out","救済する","The government decided to bail out the failing airline.","政府は経営難の航空会社を救済することにした。"],
  ["bank on ~","〜を当てにする","Don't bank on getting a raise this year — the budget is tight.","今年昇給があると当てにしないで。予算が厳しいから。"],
  ["bargain for ~","予期する","I got more than I bargained for when I accepted this project.","このプロジェクトを引き受けたとき、予想以上のことが起きた。"],
  ["bargain on ~","〜と思う","We hadn't bargained on the weather turning this bad.","天気がこんなに悪くなるとは思っていなかった。"],
  ["barge in","押し入る、割り込む","Please knock before entering — don't just barge in!","入る前にノックしてください。いきなり押し入らないで！"],
  ["barge into ~","〜に押し入る","She barged into the office without knocking and startled everyone.","彼女はノックもせず事務所に押し入り、全員を驚かせた。"],
  ["barge through ~","押しのけて進む","He barged through the crowd to reach the front of the line.","彼は列の前に行くために群衆を押しのけて進んだ。"],
  ["bawl out","怒鳴りつける","The coach bawled out the players for missing practice.","コーチは練習を欠席した選手たちを怒鳴りつけた。"],
  ["be put upon","利用される","She felt she was always being put upon by her colleagues.","彼女はいつも同僚に利用されていると感じていた。"],

// STATE & STORAGE
// ════════════════════════════════════════
let levels = {};      // phrase -> 1-5
let lastStudy = '';   // YYYY-MM-DD
let studyTime = 0;    // minutes today
let streak = 0;
let studyStartTime = 0;

function load() {
  try { levels = JSON.parse(localStorage.getItem('pv_levels') || '{}'); } catch {}
  try { lastStudy = localStorage.getItem('pv_lastStudy') || ''; } catch {}
  try { studyTime = parseInt(localStorage.getItem('pv_studyTime') || '0'); } catch {}
  try { streak = parseInt(localStorage.getItem('pv_streak') || '0'); } catch {}
  updateStreak();
}

function save() {
  try {
    localStorage.setItem('pv_levels', JSON.stringify(levels));
    localStorage.setItem('pv_lastStudy', lastStudy);
    localStorage.setItem('pv_studyTime', studyTime.toString());
    localStorage.setItem('pv_streak', streak.toString());
  } catch {}
}

function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  if (lastStudy === today) return;
  
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (lastStudy === yesterday) {
    streak++;
  } else if (lastStudy !== '') {
    streak = 1;
  } else {
    streak = 1;
  }
  lastStudy = today;
  save();
}

function startStudyTimer() {
  studyStartTime = Date.now();
}

function updateStudyTime() {
  if (studyStartTime === 0) return;
  const elapsed = Math.floor((Date.now() - studyStartTime) / 60000);
  if (elapsed > 0) {
    studyTime += elapsed;
    studyStartTime = Date.now();
    save();
  }
}

setInterval(updateStudyTime, 60000);

load();

// ════════════════════════════════════════
// STUDY MODE
// ════════════════════════════════════════
let studyMode = 'auto';
let studyQueue = [];
let studyIdx = 0;
let isFlipped = false;
let isPlaying = false;
let speedIdx = 1;
let autoChain = null;

// Speed: [pause_after_en, pause_after_ja, speech_rate_en, speech_rate_ja]
const SPEEDS = [
  [1000, 900, 0.75, 0.8],   // slow
  [700, 600, 0.9, 0.95],     // normal
  [400, 300, 1.1, 1.15],     // fast
];

function setMode(m) {
  studyMode = m;
  document.getElementById('btn-auto').classList.toggle('active', m === 'auto');
  document.getElementById('btn-manual').classList.toggle('active', m === 'manual');
  document.getElementById('speed-row').style.display = m === 'auto' ? 'flex' : 'none';
  document.getElementById('study-main').classList.toggle('clickable', m === 'manual');
  
  updateTapHint();
  
  if (m === 'auto') {
    document.getElementById('ctrl-play').textContent = '▶';
    document.getElementById('start-overlay').classList.add('show');
  } else {
    document.getElementById('ctrl-play').textContent = '↩';
    document.getElementById('start-overlay').classList.remove('show');
    isFlipped = false;
    showStudyCard();
  }
}

function updateTapHint() {
  const hint = document.getElementById('tap-hint');
  if (!hint) return;
  
  if (studyMode === 'manual') {
    hint.textContent = 'タップでめくる';
  } else if (studyMode === 'auto') {
    if (isPlaying) {
      hint.textContent = 'タップで一時停止';
    } else {
      hint.textContent = 'タップでめくる（レベル設定後は自動で次へ）';
    }
  }
}

function startStudy(words, title = 'ユニット') {
  // Apply spaced repetition: lower levels appear more
  const weighted = [];
  words.forEach(w => {
    const lv = levels[w[0]] || 1;
    const weight = 6 - lv; // lv1=5x, lv2=4x, lv3=3x, lv4=2x, lv5=1x
    for (let i = 0; i < weight; i++) weighted.push(w);
  });
  studyQueue = [...weighted].sort(() => Math.random() - 0.5);
  studyIdx = 0;
  isFlipped = false;
  isPlaying = false;
  
  document.getElementById('nav-btn').textContent = '← ' + title;
  showPage('study');
  startStudyTimer();
  if (studyMode === 'auto') {
    document.getElementById('start-overlay').classList.add('show');
  } else {
    document.getElementById('start-overlay').classList.remove('show');
    showStudyCard();
  }
}

function startUnit(unitIdx) {
  startStudy(UNITS[unitIdx], `Unit ${unitIdx + 1}`);
}

function startSpecial(type) {
  if (type === 'weak') {
    const weak = ALL_WORDS.filter(w => (levels[w[0]] || 1) <= 2);
    if (weak.length === 0) { alert('弱点なし！'); return; }
    startStudy(weak, '弱点集中');
  } else if (type === 'daily') {
    const daily = [...ALL_WORDS].sort(() => Math.random() - 0.5).slice(0, 20);
    startStudy(daily, '今日の20語');
  } else if (type === 'quiz') {
    startQuiz();
  }
}

function showStudyCard() {
  if (studyIdx >= studyQueue.length) {
    document.getElementById('card-phrase').textContent = '完了！';
    document.getElementById('card-meaning').style.display = 'none';
    document.getElementById('card-example').style.display = 'none';
    document.getElementById('level-buttons').style.display = 'none';
    document.getElementById('card-phase').textContent = 'COMPLETE';
    return;
  }
  
  const [phrase, meaning, exEn, exJa] = studyQueue[studyIdx];
  const total = studyQueue.length;
  
  document.getElementById('study-progress').textContent = (studyIdx + 1) + ' / ' + total;
  document.getElementById('pbar').style.width = ((studyIdx) / total * 100) + '%';
  
  const card = document.getElementById('study-card');
  const phraseEl = document.getElementById('card-phrase');
  const meaningEl = document.getElementById('card-meaning');
  const exampleEl = document.getElementById('card-example');
  const levelBtns = document.getElementById('level-buttons');
  
  card.classList.toggle('flipped', isFlipped);
  phraseEl.classList.toggle('small', isFlipped);
  
  if (!isFlipped) {
    // Front
    phraseEl.textContent = phrase;
    meaningEl.style.display = 'none';
    exampleEl.style.display = 'none';
    levelBtns.style.display = 'none';
    document.getElementById('card-phase').textContent = 'PHRASAL VERB';
  } else {
    // Back
    phraseEl.textContent = phrase;
    meaningEl.textContent = meaning;
    meaningEl.style.display = 'block';
    document.getElementById('card-example-en').textContent = exEn;
    document.getElementById('card-example-ja').textContent = exJa;
    exampleEl.style.display = 'block';
    levelBtns.style.display = 'flex';
    document.getElementById('card-phase').textContent = '意　　　　味';
    
    // Update level buttons
    const lv = levels[phrase] || 1;
    for (let i = 1; i <= 5; i++) {
      document.querySelector(`.lv-btn.lv${i}`).classList.toggle('active', i === lv);
    }
  }
  
  document.getElementById('study-card').classList.remove('fade-in');
  void document.getElementById('study-card').offsetWidth;
  document.getElementById('study-card').classList.add('fade-in');
}

function setLevel(lv) {
  if (studyIdx >= studyQueue.length) return;
  const phrase = studyQueue[studyIdx][0];
  levels[phrase] = lv;
  save();
  showStudyCard();
  
  // In auto mode (paused), advance to next card after setting level
  if (studyMode === 'auto' && !isPlaying) {
    setTimeout(() => {
      studyIdx++;
      isFlipped = false;
      showStudyCard();
    }, 400);
  }
}

function goPrev() {
  stopAuto();
  studyIdx = Math.max(0, studyIdx - 1);
  isFlipped = false;
  showStudyCard();
}

function goNext() {
  stopAuto();
  studyIdx++;
  isFlipped = false;
  if (studyMode === 'auto' && isPlaying) startAutoChain();
  else showStudyCard();
}

function togglePlay() {
  if (studyMode === 'auto') {
    isPlaying = !isPlaying;
    document.getElementById('ctrl-play').textContent = isPlaying ? '⏸' : '▶';
    document.getElementById('pause-overlay').classList.toggle('show', !isPlaying);
    updateTapHint();
    if (isPlaying) {
      // Resume: if already flipped, move to next; otherwise continue
      if (isFlipped) {
        studyIdx++;
        isFlipped = false;
      }
      startAutoChain();
    } else {
      stopAuto();
    }
  } else {
    // Manual: flip
    isFlipped = !isFlipped;
    showStudyCard();
    if (isFlipped) {
      speakEN(studyQueue[studyIdx][0]);
      setTimeout(() => speakJA(studyQueue[studyIdx][1]), 1200);
    }
  }
}

// Manual mode tap
document.getElementById('study-main').addEventListener('click', (e) => {
  // Don't interfere with button clicks
  if (e.target.closest('button')) return;
  
  if (studyMode === 'manual') {
    // Manual mode: always flip
    isFlipped = !isFlipped;
    showStudyCard();
    if (isFlipped) {
      speakEN(studyQueue[studyIdx][0]);
      setTimeout(() => speakJA(studyQueue[studyIdx][1]), 1200);
    }
  } else if (studyMode === 'auto') {
    if (isPlaying) {
      // Auto + playing: pause
      isPlaying = false;
      document.getElementById('ctrl-play').textContent = '▶';
      document.getElementById('pause-overlay').classList.add('show');
      stopAuto();
    } else {
      // Auto + paused: flip manually
      isFlipped = !isFlipped;
      showStudyCard();
      if (isFlipped) {
        speakEN(studyQueue[studyIdx][0]);
        setTimeout(() => speakJA(studyQueue[studyIdx][1]), 1200);
      }
    }
  }
});

function startAuto() {
  isPlaying = true;
  document.getElementById('start-overlay').classList.remove('show');
  document.getElementById('ctrl-play').textContent = '⏸';
  document.getElementById('pause-overlay').classList.remove('show');
  updateTapHint();
  isFlipped = false;
  studyIdx = 0;
  startAutoChain();
}

function startAutoChain() {
  clearTimeout(autoChain); // Clear timer but don't cancel speech
  if (!isPlaying || studyIdx >= studyQueue.length) {
    showStudyCard();
    return;
  }
  
  isFlipped = false;
  showStudyCard();
  
  const [phrase, meaning] = studyQueue[studyIdx];
  const [pauseEn, pauseJa, rateEn, rateJa] = SPEEDS[speedIdx];
  
  // Step 1: speak EN
  speakENChain(phrase, rateEn, () => {
    if (!isPlaying) return;
    // Step 2: wait, then flip
    autoChain = setTimeout(() => {
      if (!isPlaying) return;
      isFlipped = true;
      showStudyCard();
      // Step 3: speak JA
      speakJAChain(meaning, rateJa, () => {
        if (!isPlaying) return;
        // Step 4: wait, then next
        autoChain = setTimeout(() => {
          if (!isPlaying) return;
          studyIdx++;
          startAutoChain();
        }, pauseJa);
      });
    }, pauseEn);
  });
}

function stopAuto() {
  clearTimeout(autoChain);
  stopSpeak();
}

function setSpeed(i) {
  speedIdx = i;
  document.querySelectorAll('.speed-btn').forEach((b, j) => b.classList.toggle('on', j === i));
  if (studyMode === 'auto' && isPlaying) startAutoChain();
}

function speakExample() {
  if (studyIdx >= studyQueue.length) return;
  speakEN(studyQueue[studyIdx][2]);
}

// ════════════════════════════════════════
// TTS with onend chain
// ════════════════════════════════════════
function setIndicator(on) {
  document.getElementById('audio-indicator').classList.toggle('on', on);
}

function speakENChain(text, rate, onDone) {
  if (!window.speechSynthesis) { onDone && onDone(); return; }
  speechSynthesis.cancel();
  text = text.replace(/\s*~\s*/g, ' ').trim();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = rate;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === 'en-US' && v.localService) || voices.find(v => v.lang.startsWith('en')) || null;
  if (v) u.voice = v;
  u.onstart = () => setIndicator(true);
  u.onend = () => { setIndicator(false); onDone && onDone(); };
  u.onerror = () => { setIndicator(false); onDone && onDone(); };
  speechSynthesis.speak(u);
}

function speakJAChain(text, rate, onDone) {
  if (!window.speechSynthesis) { onDone && onDone(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = rate;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === 'ja-JP' && v.localService) || voices.find(v => v.lang.startsWith('ja')) || null;
  if (v) u.voice = v;
  u.onstart = () => setIndicator(true);
  u.onend = () => { setIndicator(false); onDone && onDone(); };
  u.onerror = () => { setIndicator(false); onDone && onDone(); };
  speechSynthesis.speak(u);
}

function speakEN(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  text = text.replace(/\s*~\s*/g, ' ').trim();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === 'en-US' && v.localService) || voices.find(v => v.lang.startsWith('en')) || null;
  if (v) u.voice = v;
  u.onstart = () => setIndicator(true);
  u.onend = () => setIndicator(false);
  u.onerror = () => setIndicator(false);
  speechSynthesis.speak(u);
}

function speakJA(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.9;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === 'ja-JP' && v.localService) || voices.find(v => v.lang.startsWith('ja')) || null;
  if (v) u.voice = v;
  u.onstart = () => setIndicator(true);
  u.onend = () => setIndicator(false);
  u.onerror = () => setIndicator(false);
  speechSynthesis.speak(u);
}

function stopSpeak() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  setIndicator(false);
}

// iOS Safari voice load
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => {};
}

// ════════════════════════════════════════
// QUIZ
// ════════════════════════════════════════
let quizQueue = [];
let quizIdx = 0;
let quizCorrectStreak = 0;

function startQuiz() {
  quizQueue = [...ALL_WORDS].sort(() => Math.random() - 0.5);
  quizIdx = 0;
  quizCorrectStreak = 0;
  showPage('quiz');
  startStudyTimer();
  showQuizCard();
}

function showQuizCard() {
  if (quizIdx >= quizQueue.length) {
    document.getElementById('quiz-phrase').textContent = '完了！';
    document.getElementById('quiz-options').innerHTML = '';
    return;
  }
  
  const [phrase, meaning] = quizQueue[quizIdx];
  document.getElementById('quiz-phrase').textContent = phrase;
  
  // Generate 3 wrong answers
  const wrong = ALL_WORDS.filter(w => w[1] !== meaning).sort(() => Math.random() - 0.5).slice(0, 3).map(w => w[1]);
  const all = [meaning, ...wrong].sort(() => Math.random() - 0.5);
  
  const wrap = document.getElementById('quiz-options');
  wrap.innerHTML = '';
  all.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuiz(opt, meaning);
    wrap.appendChild(btn);
  });
  
  document.getElementById('quiz-result').classList.remove('show');
}

function answerQuiz(selected, correct) {
  const isCorrect = selected === correct;
  const opts = document.querySelectorAll('.quiz-opt');
  
  opts.forEach(opt => {
    opt.classList.add('disabled');
    if (opt.textContent === correct) opt.classList.add('correct');
    if (opt.textContent === selected && !isCorrect) opt.classList.add('wrong');
  });
  
  const phrase = quizQueue[quizIdx][0];
  const lv = levels[phrase] || 1;
  
  if (isCorrect) {
    quizCorrectStreak++;
    if (lv < 5) {
      levels[phrase] = Math.min(5, lv + (quizCorrectStreak >= 2 ? 2 : 1));
    }
    document.getElementById('result-icon').textContent = '🎉';
    document.getElementById('result-text').textContent = '正解！';
  } else {
    quizCorrectStreak = 0;
    if (lv > 1) {
      levels[phrase] = Math.max(1, lv - 1);
    }
    document.getElementById('result-icon').textContent = '❌';
    document.getElementById('result-text').textContent = `不正解。正解は「${correct}」`;
  }
  
  save();
  document.getElementById('quiz-result').classList.add('show');
}

function nextQuiz() {
  quizIdx++;
  showQuizCard();
}

// ════════════════════════════════════════
// HOME & STATS
// ════════════════════════════════════════
function renderHome() {
  const masters = ALL_WORDS.filter(w => levels[w[0]] === 5).length;
  const pct = Math.round(masters / ALL_WORDS.length * 100);
  
  document.getElementById('home-master-pct').textContent = pct + '%';
  document.getElementById('home-master-count').textContent = masters + ' / ' + ALL_WORDS.length;
  document.getElementById('home-streak').textContent = streak;
  document.getElementById('home-time').textContent = studyTime;
  
  // Units
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  UNITS.forEach((unit, i) => {
    const mastered = unit.filter(w => levels[w[0]] === 5).length;
    const prog = Math.round(mastered / unit.length * 100);
    
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => startUnit(i);
    card.innerHTML = `
      <div class="unit-num">Unit ${i + 1}</div>
      <div class="unit-prog">${prog}%</div>
      <div class="unit-bar"><div class="unit-fill" style="width:${prog}%"></div></div>
    `;
    grid.appendChild(card);
  });
}

function renderStats() {
  document.getElementById('stats-streak').textContent = streak;
  document.getElementById('stats-time').textContent = studyTime;
  
  // Level distribution
  const counts = [0, 0, 0, 0, 0];
  ALL_WORDS.forEach(w => {
    const lv = levels[w[0]] || 1;
    counts[lv - 1]++;
  });
  
  const chart = document.getElementById('level-chart');
  chart.innerHTML = '';
  const names = ['🌱 はじめまして', '🌿 なんとなく', '🌳 だいたいOK', '⭐ 自信あり', '🏆 マスター'];
  const colors = ['var(--lv1)', 'var(--lv2)', 'var(--lv3)', 'var(--lv4)', 'var(--lv5)'];
  
  counts.forEach((c, i) => {
    const pct = Math.round(c / ALL_WORDS.length * 100);
    chart.innerHTML += `
      <div class="level-bar">
        <div class="level-bar-label">${names[i]}</div>
        <div class="level-bar-fill">
          <div class="level-bar-inner" style="width:${pct}%;background:${colors[i]}"></div>
          <div class="level-bar-count">${c}</div>
        </div>
      </div>
    `;
  });
}

// ════════════════════════════════════════
// NAV
// ════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('nav-btn').style.display = id === 'home' ? 'none' : 'block';
  
  if (id === 'home') renderHome();
  if (id === 'stats') renderStats();
  if (id !== 'study' && id !== 'quiz') {
    stopAuto();
    updateStudyTime();
  }
}

function navBack() {
  stopAuto();
  updateStudyTime();
  showPage('home');
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
renderHome();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Phrasal Verb Master</title>
<script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:16px 14px 60px}
.wrap{max-width:480px;margin:0 auto}
h1{font-size:20px;font-weight:800;letter-spacing:.5px;color:#e6edf3}
h1 span{color:#58a6ff}

/* Pills / buttons */
.pill{border:1.5px solid #30363d;border-radius:20px;background:#161b22;color:#e6edf3;padding:10px 18px;font-size:14px;cursor:pointer;font-family:inherit}
.pill:active{opacity:.7}

/* Card flip */
.fo{perspective:1200px;cursor:pointer;position:relative}
.fi{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.fi.f{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;padding:24px}
.cb{transform:rotateY(180deg)}

/* Progress bar */
.pbg{background:#21262d;border-radius:4px;overflow:hidden}
.pfill{background:linear-gradient(90deg,#1f6feb,#58a6ff);height:100%;border-radius:4px;transition:width .3s}

/* Letter button */
.lb{border:1.5px solid #30363d;border-radius:10px;background:#161b22;color:#8b949e;padding:6px 10px;font-size:13px;cursor:pointer;font-family:inherit}
.lb.a{background:#1f6feb22;color:#58a6ff;border-color:#1f6feb}
.lb:active{opacity:.7}

/* Tag */
.tag{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:10px;text-transform:uppercase}

/* Verb row */
.vrow{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:default}
.vrow:active{background:#21262d44}

/* Speak button */
.spk{border:1.5px solid #30363d;border-radius:14px;background:#161b22;color:#8b949e;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.spk:active{opacity:.7}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f6feb;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .3s;z-index:100}
.toast.show{opacity:1}

/* Nav tabs */
.nav{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px}
.nav::-webkit-scrollbar{display:none}
.ntab{border:none;border-bottom:2.5px solid transparent;background:none;color:#8b949e;padding:6px 12px;font-size:14px;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:600}
.ntab.a{color:#58a6ff;border-bottom-color:#58a6ff}

@media(max-width:360px){body{padding:12px 10px 50px}}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h1>📚 Phrasal Verb <span>Master</span></h1>
    <span id="badge" style="font-size:12px;color:#8b949e"></span>
  </div>

  <!-- Nav -->
  <div class="nav" id="nav">
    <button class="ntab a" onclick="setMode('home')" id="tab-home">🏠 ホーム</button>
    <button class="ntab" onclick="setMode('study')" id="tab-study">📖 学習</button>
    <button class="ntab" onclick="setMode('list')" id="tab-list">📋 一覧</button>
    <button class="ntab" onclick="setMode('stats')" id="tab-stats">📊 統計</button>
  </div>

  <div id="main"></div>
</div>

<div class="toast" id="toast"></div>

const STATUS = {NEW:"new",LEARNING:"learning",KNOWN:"known"};
let progress = {};
let mode = "home";
let queue = [];
let idx = 0;
let flipped = false;
let letter = "ALL";
let speaking = false;

// Persist
function load(){try{const v=localStorage.getItem("pv2");if(v)progress=JSON.parse(v);}catch{}}
function save(){try{localStorage.setItem("pv2",JSON.stringify(progress));}catch{}}

// TTS
function tts(text){
  if(window.responsiveVoice){
    window.responsiveVoice.cancel();
    window.responsiveVoice.speak(text,"UK English Female",{rate:0.9});
    return;
  }
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.85;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang.startsWith("en"))||vs[0];
  if(v) u.voice=v;
  window.speechSynthesis.speak(u);
}

// Toast
let _toastT=null;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.remove("show"),1800);
}

function counts(){
  return {
    total:VERBS.length,
    known:VERBS.filter(v=>progress[v.id]===STATUS.KNOWN).length,
    learning:VERBS.filter(v=>progress[v.id]===STATUS.LEARNING).length,
    new_:VERBS.filter(v=>!progress[v.id]||progress[v.id]===STATUS.NEW).length
  };
}

function pct(){const c=counts();return Math.round(c.known/c.total*100);}

function letters(){
  return ["ALL",...Array.from(new Set(VERBS.map(v=>v.phrase[0].toUpperCase()))).sort()];
}

function filtered(){
  return letter==="ALL"?VERBS:VERBS.filter(v=>v.phrase[0].toUpperCase()===letter);
}

function setMode(m){
  mode=m;
  document.querySelectorAll(".ntab").forEach(t=>t.classList.remove("a"));
  const tab=document.getElementById("tab-"+m);
  if(tab) tab.classList.add("a");
  if(m==="study") startStudy();
  else render();
}

function startStudy(){
  const filt=filtered();
  queue=[...filt].sort(()=>Math.random()-.5);
  idx=0; flipped=false;
  render();
}

function mark(st){
  progress[queue[idx].id]=st; save();
  flipped=false;
  if(idx+1<queue.length){idx++;render();}
  else{mode="home";render();}
}

function flip(){
  flipped=!flipped;
  const fi=document.getElementById("fi");
  const fo=document.getElementById("fo");
  if(!fi||!fo) return;
  const H=flipped?420:240;
  fo.style.height=H+"px"; fi.style.height=H+"px";
  if(flipped){fi.classList.add("f");tts(queue[idx].phrase);}
  else fi.classList.remove("f");
}

function renderHome(){
  const c=counts(); const p=pct();
  return `
<div style="background:#161b22;border:1.5px solid #30363d;border-radius:18px;padding:22px;margin-bottom:18px">
  <div style="font-size:15px;font-weight:700;margin-bottom:16px">進捗サマリー</div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    ${[["✅",c.known,"覚えた","#3fb950"],["🔁",c.learning,"学習中","#d29922"],["⬜",c.new_,"未学習","#8b949e"]].map(([ic,n,lb,col])=>`
    <div style="flex:1;background:#0d1117;border-radius:12px;padding:12px 8px;text-align:center;border:1px solid #21262d">
      <div style="font-size:20px">${ic}</div>
      <div style="font-size:20px;font-weight:800;color:${col};line-height:1.2">${n}</div>
      <div style="font-size:11px;color:#8b949e;margin-top:2px">${lb}</div>
    </div>`).join("")}
  </div>
  <div style="margin-bottom:6px;display:flex;justify-content:space-between;font-size:13px"><span style="color:#8b949e">達成率</span><span style="color:#58a6ff;font-weight:700">${p}%</span></div>
  <div class="pbg" style="height:8px"><div class="pfill" style="width:${p}%"></div></div>
</div>

<div style="background:#161b22;border:1.5px solid #30363d;border-radius:18px;padding:20px;margin-bottom:18px">
  <div style="font-size:14px;color:#8b949e;margin-bottom:12px">文字を選んで学習</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
    ${letters().map(l=>`<button class="lb${letter===l?" a":""}" onclick="letter='${l}';renderHome_update()">${l}</button>`).join("")}
  </div>
  ${letter!=="ALL"?`<button class="pill" style="width:100%;background:#1f6feb22;border-color:#1f6feb;color:#58a6ff;font-weight:700;padding:12px" onclick="setMode('study')">【${letter}】を学習（${filtered().length}語）</button>`:""}
</div>

<div style="display:flex;gap:10px;margin-bottom:14px">
  <button class="pill" style="flex:1;background:#1f6feb22;border-color:#1f6feb;color:#58a6ff;font-weight:700;padding:12px" onclick="letter='ALL';setMode('study')">🃏 全部シャッフル</button>
</div>
<div style="text-align:right">
  <button class="pill" style="background:none;color:#8b949e;font-size:12px;padding:6px 14px" onclick="if(confirm('進捗をリセットしますか？')){progress={};save();render();toast('🔄 リセットしました');}">進捗リセット</button>
</div>`;
}

function renderHome_update(){
  document.getElementById("main").innerHTML=renderHome();
}

function renderStudy(){
  if(queue.length===0) return `<div style="text-align:center;color:#8b949e;padding:40px 0">単語がありません。ホームから選択してください。</div>`;
  const verb=queue[idx];
  const st=progress[verb.id]||STATUS.NEW;
  const stCol={known:"#2ea043",learning:"#9e6a03",new:"#30363d"}[st];
  const stLbl={known:"覚えた",learning:"学習中",new:"未学習"}[st];
  const H=flipped?420:240;
  return `
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
  <span style="font-size:13px;color:#8b949e">${idx+1} / ${queue.length}</span>
  <button class="pill" style="background:#21262d;color:#8b949e;font-size:12px;padding:6px 14px" onclick="mode='home';render()">← 戻る</button>
</div>
<div class="pbg" style="height:4px;margin-bottom:20px"><div class="pfill" style="width:${Math.round((idx+1)/queue.length*100)}%"></div></div>

<div class="fo" id="fo" style="height:${H}px;margin-bottom:18px" onclick="flip()">
  <div class="fi${flipped?" f":""}" id="fi" style="height:${H}px">
    <!-- 表 -->
    <div class="cf" style="background:linear-gradient(135deg,#161b22,#1c2128);border:1.5px solid #30363d;justify-content:center;align-items:center">
      <div style="font-size:11px;color:#8b949e;margin-bottom:14px;letter-spacing:2px;text-transform:uppercase">Phrasal Verb</div>
      <div style="font-size:${verb.phrase.length>24?20:verb.phrase.length>18?22:26}px;font-weight:700;color:#e6edf3;text-align:center;padding:0 20px;font-style:italic">${verb.phrase}</div>
      <div style="margin-top:18px;font-size:13px;color:#58a6ff">タップしてめくる ↩</div>
      <span class="tag" style="position:absolute;top:14px;right:14px;background:${stCol}22;color:${stCol}">${stLbl}</span>
    </div>
    <!-- 裏 -->
    <div class="cf cb" style="background:linear-gradient(135deg,#0d1117,#1c2128);border:1.5px solid #1f6feb55;padding:20px;overflow-y:auto;justify-content:flex-start">
      <div style="font-size:21px;font-weight:700;color:#58a6ff;line-height:1.5;margin-bottom:12px;text-align:center;padding-top:6px">${verb.def||"—"}</div>
      <div style="height:1px;background:#21262d;margin-bottom:12px"></div>
      <div style="font-size:14px;color:#c9d1d9;line-height:1.8;margin-bottom:6px;font-style:italic">${verb.en}</div>
      <div style="font-size:13px;color:#8b949e;line-height:1.6;margin-bottom:14px">${verb.ja}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="spk" onclick="event.stopPropagation();tts('${verb.phrase.replace(/'/g,"\'")}')">🔊 熟語</button>
        <button class="spk" onclick="event.stopPropagation();tts('${verb.en.replace(/'/g,"\'")}')">📖 例文</button>
      </div>
    </div>
  </div>
</div>

<div style="display:flex;gap:10px;margin-bottom:12px">
  <button class="pill" style="flex:1;background:#21262d;color:#8b949e;padding:12px 0;font-size:14px" onclick="mark('new')">↩ まだ</button>
  <button class="pill" style="flex:1;background:#9e6a0322;color:#d29922;border-color:#9e6a03;padding:12px 0;font-size:14px" onclick="mark('learning')">🔁 復習</button>
  <button class="pill" style="flex:1;background:#2ea04322;color:#3fb950;border-color:#2ea043;padding:12px 0;font-size:14px" onclick="mark('known')">✅ 覚えた</button>
</div>
<div style="text-align:center">
  <button class="pill" style="background:none;color:#8b949e;font-size:13px;padding:6px 14px" onclick="if(idx+1<queue.length){idx++;flipped=false;render();}else{mode='home';render();}">スキップ →</button>
</div>`;
}

function renderList(){
  const filt=filtered();
  return `
<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
  ${letters().map(l=>`<button class="lb${letter===l?" a":""}" onclick="letter='${l}';render()">${l}</button>`).join("")}
</div>
<div style="font-size:13px;color:#8b949e;margin-bottom:10px">${filt.length} 語</div>
<div style="background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden">
  ${filt.map((v,i)=>{
    const st=progress[v.id]||STATUS.NEW;
    const ic={known:"✅",learning:"🔁",new:"⬜"}[st];
    return `<div class="vrow" style="${i<filt.length-1?"border-bottom:1px solid #21262d":""}">
      <span style="font-size:16px">${ic}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;color:#e6edf3;font-style:italic;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.phrase}</div>
        <div style="font-size:12px;color:#58a6ff;margin-top:2px">${v.def||""}</div>
      </div>
      <button class="spk" onclick="event.stopPropagation();tts('${v.phrase.replace(/'/g,"\'")}')">🔊</button>
    </div>`;
  }).join("")}
</div>`;
}

function renderStats(){
  const c=counts();const p=pct();
  const lts=letters().filter(l=>l!=="ALL");
  return `
<div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:22px;margin-bottom:18px">
  <div style="font-size:17px;font-weight:700;margin-bottom:18px">学習統計</div>
  ${[["総単語数",c.total,"#e6edf3"],["✅ 覚えた",c.known,"#3fb950"],["🔁 学習中",c.learning,"#d29922"],["⬜ 未学習",c.new_,"#8b949e"],["達成率",p+"%","#58a6ff"]].map(([l,val,col])=>`
  <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #21262d">
    <span style="color:#8b949e">${l}</span>
    <span style="font-weight:700;font-size:22px;color:${col}">${val}</span>
  </div>`).join("")}
</div>
<div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:22px">
  <div style="font-size:15px;font-weight:700;margin-bottom:14px">文字別進捗</div>
  ${lts.map(lt=>{
    const g=VERBS.filter(v=>v.phrase[0].toUpperCase()===lt);
    const k=g.filter(v=>progress[v.id]===STATUS.KNOWN).length;
    const w=Math.round(k/g.length*100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="color:#e6edf3;font-weight:600">${lt}</span>
        <span style="color:#8b949e">${k}/${g.length}</span>
      </div>
      <div class="pbg" style="height:5px"><div class="pfill" style="width:${w}%"></div></div>
    </div>`;
  }).join("")}
</div>`;
}

function render(){
  // update badge
  document.getElementById("badge").textContent=pct()+"%達成";
  // update tabs
  ["home","study","list","stats"].forEach(m=>{
    const el=document.getElementById("tab-"+m);
    if(el) el.classList.toggle("a",m===mode);
  });
  const main=document.getElementById("main");
  if(mode==="home") main.innerHTML=renderHome();
  else if(mode==="study") main.innerHTML=renderStudy();
  else if(mode==="list") main.innerHTML=renderList();
  else if(mode==="stats") main.innerHTML=renderStats();
}

// Init
load();
render();
</script>
</body>
